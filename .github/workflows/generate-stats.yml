name: Generate GitHub Stats

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── Card 1: General Stats ──────────────────────────────────────────────
      - name: Generate Stats Card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ github.token }}
          user: whozahm3d
          template: classic
          base: header, activity, community, repositories
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_ignored: Jupyter Notebook, TeX
          config_timezone: Asia/Karachi
          filename: assets/stats.svg
          output_action: commit
          committer_branch: main

      # ── Card 2: Top Languages ──────────────────────────────────────────────
      - name: Generate Languages Card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ github.token }}
          user: whozahm3d
          template: classic
          base: ""
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_ignored: Jupyter Notebook, TeX
          plugin_languages_details: percentage
          config_timezone: Asia/Karachi
          filename: assets/languages.svg
          output_action: commit
          committer_branch: main

      # ── Card 3: Isometric Calendar (wide) ─────────────────────────────────
      - name: Generate Isometric Calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ github.token }}
          user: whozahm3d
          template: classic
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          config_timezone: Asia/Karachi
          config_display: large
          filename: assets/calendar.svg
          output_action: commit
          committer_branch: main
