name: Generate GitHub Stats

on:
  schedule:
    - cron: "0 */12 * * *"   # runs every 12 hours automatically
  workflow_dispatch:           # allows manual trigger from GitHub Actions tab
  push:
    branches: [main]          # also runs on every push to main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # needed to commit generated images back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check METRICS_TOKEN format
        if: ${{ !startsWith(secrets.METRICS_TOKEN, 'github_pat_') }}
        run: |
          echo "::warning::METRICS_TOKEN is missing or uses a legacy format. Add a fine-grained personal access token (github_pat_) as the METRICS_TOKEN secret to generate stats cards."

      # ── Card 1: General Stats ──────────────────────────────────────────────
      - name: Generate Stats Card
        if: ${{ startsWith(secrets.METRICS_TOKEN, 'github_pat_') }}
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: whozahm3d
          template: classic
          base: header, activity, community, repositories
          plugin_languages: yes
          plugin_languages_limit: 8
          config_timezone: Asia/Karachi
          filename: assets/stats.svg
          output_action: commit
          committer_branch: main

      # ── Card 2: Top Languages ──────────────────────────────────────────────
      - name: Generate Languages Card
        if: ${{ startsWith(secrets.METRICS_TOKEN, 'github_pat_') }}
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: whozahm3d
          template: classic
          base: ""
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_details: percentage
          config_timezone: Asia/Karachi
          filename: assets/languages.svg
          output_action: commit
          committer_branch: main

      # ── Card 3: Contribution Calendar ─────────────────────────────────────
      - name: Generate Isometric Calendar
        if: ${{ startsWith(secrets.METRICS_TOKEN, 'github_pat_') }}
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: whozahm3d
          template: classic
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          config_timezone: Asia/Karachi
          filename: assets/calendar.svg
          output_action: commit
          committer_branch: main
